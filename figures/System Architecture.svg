<svg viewBox="0 0 800 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients and styles -->
  <defs>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sourceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50C878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3DA35D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7D3C98;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2C3E50" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#2C3E50">
    System Architecture of Fake News Detection Pipeline
  </text>
  
  <!-- Data Sources -->
  <rect x="250" y="80" width="300" height="80" rx="10" fill="url(#sourceGradient)" filter="url(#shadow)"/>
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
    Data Sources
  </text>
  <text x="400" y="135" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">
    (ISOT + Mahdi)
  </text>
  
  <!-- Arrow 1 -->
  <line x1="400" y1="160" x2="400" y2="200" stroke="#2C3E50" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Data Preprocessing -->
  <rect x="200" y="200" width="400" height="100" rx="10" fill="url(#boxGradient)" filter="url(#shadow)"/>
  <text x="400" y="230" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
    Data Preprocessing
  </text>
  <text x="400" y="255" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">
    (clean_text, stopwords removal,
  </text>
  <text x="400" y="275" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">
    lemmatization)
  </text>
  
  <!-- Arrow 2 -->
  <line x1="400" y1="300" x2="400" y2="340" stroke="#2C3E50" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Feature Extraction -->
  <rect x="200" y="340" width="400" height="90" rx="10" fill="url(#boxGradient)" filter="url(#shadow)"/>
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
    Feature Extraction
  </text>
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">
    (TF-IDF Vectorizer)
  </text>
  <text x="400" y="415" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.9">
    Convert text to numerical features
  </text>
  
  <!-- Arrow 3 -->
  <line x1="400" y1="430" x2="400" y2="470" stroke="#2C3E50" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Model Training -->
  <rect x="200" y="470" width="400" height="90" rx="10" fill="url(#boxGradient)" filter="url(#shadow)"/>
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
    Model Training
  </text>
  <text x="400" y="525" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">
    (Logistic Regression)
  </text>
  <text x="400" y="545" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.9">
    Train classifier on labeled data
  </text>
  
  <!-- Arrow 4 -->
  <line x1="400" y1="560" x2="400" y2="600" stroke="#2C3E50" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Model Evaluation -->
  <rect x="200" y="600" width="400" height="90" rx="10" fill="url(#boxGradient)" filter="url(#shadow)"/>
  <text x="400" y="630" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
    Model Evaluation
  </text>
  <text x="400" y="655" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">
    (Accuracy, Precision, Recall, ROC-AUC)
  </text>
  <text x="400" y="675" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.9">
    Assess model performance
  </text>
  
  <!-- Arrow 5 -->
  <line x1="400" y1="690" x2="400" y2="730" stroke="#2C3E50" stroke-width="3" marker-end="url(#arrowhead)"/>
  
  <!-- Streamlit Web App -->
  <rect x="200" y="730" width="400" height="90" rx="10" fill="url(#outputGradient)" filter="url(#shadow)"/>
  <text x="400" y="760" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
    Streamlit Web Application
  </text>
  <text x="400" y="785" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white">
    (User Interface)
  </text>
  <text x="400" y="805" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" opacity="0.9">
    Interactive news classification interface
  </text>
  
  <!-- Decorative elements -->
  <circle cx="180" cy="120" r="8" fill="#50C878" opacity="0.6"/>
  <circle cx="620" cy="120" r="8" fill="#50C878" opacity="0.6"/>
  <circle cx="180" cy="770" r="8" fill="#9B59B6" opacity="0.6"/>
  <circle cx="620" cy="770" r="8" fill="#9B59B6" opacity="0.6"/>
</svg>